services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clawnow
      POSTGRES_USER: clawnow
      POSTGRES_PASSWORD: clawnow
    ports:
      - "45433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "46379:6379"

volumes:
  postgres_data:
